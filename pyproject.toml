[project]
name = "mediagen"
version = "0.1.0"
description = "Thin, Claude-driven CLI for AI image + video generation on Vertex AI (Gemini + Veo)"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1",
    "Pillow>=10.0",
]
# No provider SDKs / API keys: image + video both use gcloud auth + Vertex REST.

[project.optional-dependencies]
tui = ["questionary>=2.0"]

[project.scripts]
mediagen = "mediagen.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mediagen"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
# E501 (line length) left to formatting, not the linter — existing code uses long
# aligned comments and click help strings intentionally.
ignore = ["E501"]
